name: Build ESP32 Firmware

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        board: [esp32dev]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
    
    - name: Run PlatformIO Build
      run: |
        pio run -e ${{ matrix.board }}
    
    - name: Build Filesystem
      run: |
        pio run -e ${{ matrix.board }} -t buildfs
    
    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware-${{ matrix.board }}
        path: |
          .pio/build/${{ matrix.board }}/firmware.bin
          .pio/build/${{ matrix.board }}/spiffs.bin
          .pio/build/${{ matrix.board }}/bootloader.bin
          .pio/build/${{ matrix.board }}/partitions.bin
        retention-days: 30
    
    - name: Create Release on Tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          .pio/build/${{ matrix.board }}/firmware.bin
          .pio/build/${{ matrix.board }}/spiffs.bin
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Notify on Failure
      if: failure()
      run: echo "Build failed for board ${{ matrix.board }}"
